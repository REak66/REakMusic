<p-confirmDialog [style]="{ width: '420px' }" [baseZIndex]="10000">
  <ng-template pTemplate="headless" let-message #content>
    <div class="confirm-dialog" [ngClass]="message.styleClass">
      <!-- Icon -->
      <div class="confirm-dialog__icon-wrapper" [ngClass]="{
        'confirm-dialog__icon-wrapper--success': message.styleClass?.includes('confirm-dialog--success') || message.icon?.includes('check')
      }">
        <i *ngIf="message.icon; else defaultIcon" [class]="message.icon + ' confirm-dialog__icon'" [ngClass]="{
          'confirm-dialog__icon--success': message.styleClass?.includes('confirm-dialog--success') || message.icon?.includes('check')
        }"></i>
        <ng-template #defaultIcon>
          <i class="fa-solid fa-triangle-exclamation confirm-dialog__icon"></i>
        </ng-template>
      </div>

      <!-- Content -->
      <div class="confirm-dialog__body">
        <h3 class="confirm-dialog__header">{{ message.header }}</h3>
        <p class="confirm-dialog__message">{{ message.message }}</p>
      </div>

      <!-- Actions -->
      <div class="confirm-dialog__footer">
        <button
          *ngIf="message.rejectVisible !== false"
          class="btn btn--ghost"
          (click)="reject(message)"
          type="button">
          <i class="fa-solid fa-xmark btn__icon"></i>
          {{ message.rejectLabel || 'Cancel' }}
        </button>
        <button
          *ngIf="message.acceptVisible !== false"
          class="btn"
          [ngClass]="message.styleClass?.includes('confirm-dialog--success') ? 'btn--success' : 'btn--danger'"
          (click)="accept(message)"
          type="button">
          <i class="fa-solid fa-check btn__icon"></i>
          {{ message.acceptLabel || 'Confirm' }}
        </button>
      </div>
    </div>
  </ng-template>
</p-confirmDialog>
