<!-- ── Song Cards Grid ─────────────────────────────────────────── -->
<ng-container [ngSwitch]="type">

  <ng-container *ngSwitchCase="'song-cards'">
    <div class="skeleton-grid">
      <div class="skeleton-card" *ngFor="let i of items">
        <p-skeleton styleClass="skeleton-thumb" height="180px" borderRadius="12px" />
        <div class="skeleton-card-body">
          <p-skeleton width="80%" height="1rem" styleClass="mb-2" borderRadius="6px" />
          <p-skeleton width="55%" height="0.85rem" styleClass="mb-2" borderRadius="6px" />
          <p-skeleton width="40%" height="1rem" borderRadius="6px" />
        </div>
      </div>
    </div>
  </ng-container>

  <!-- ── Trending List ───────────────────────────────────────────── -->
  <ng-container *ngSwitchCase="'trending'">
    <div class="skeleton-trending">
      <div class="skeleton-trending-item" *ngFor="let i of items">
        <p-skeleton shape="circle" size="2rem" styleClass="flex-shrink-0" />
        <p-skeleton shape="square" width="48px" height="48px" borderRadius="8px" styleClass="flex-shrink-0" />
        <div class="skeleton-trending-info">
          <p-skeleton width="60%" height="0.9rem" styleClass="mb-1" borderRadius="6px" />
          <p-skeleton width="40%" height="0.75rem" borderRadius="6px" />
        </div>
        <p-skeleton width="80px" height="0.85rem" borderRadius="6px" styleClass="ms-auto" />
      </div>
    </div>
  </ng-container>

  <!-- ── Song Detail ─────────────────────────────────────────────── -->
  <ng-container *ngSwitchCase="'song-detail'">
    <div class="skeleton-detail">
      <p-skeleton styleClass="skeleton-detail-cover" height="280px" borderRadius="16px" />
      <div class="skeleton-detail-content">
        <div class="skeleton-tags">
          <p-skeleton width="70px" height="1.5rem" borderRadius="20px" />
          <p-skeleton width="90px" height="1.5rem" borderRadius="20px" />
        </div>
        <p-skeleton width="75%" height="2rem" styleClass="mt-2 mb-3" borderRadius="8px" />
        <p-skeleton width="55%" height="0.9rem" styleClass="mb-2" borderRadius="6px" />
        <p-skeleton width="45%" height="0.9rem" styleClass="mb-2" borderRadius="6px" />
        <p-skeleton width="50%" height="0.9rem" styleClass="mb-2" borderRadius="6px" />
        <p-skeleton width="40%" height="0.9rem" styleClass="mb-4" borderRadius="6px" />
        <p-skeleton width="100%" height="3.5rem" styleClass="mb-4" borderRadius="8px" />
        <div class="skeleton-actions">
          <p-skeleton width="130px" height="2.5rem" borderRadius="8px" />
          <p-skeleton width="160px" height="2.5rem" borderRadius="8px" />
        </div>
      </div>
    </div>
  </ng-container>

  <!-- ── Album Detail ────────────────────────────────────────────── -->
  <ng-container *ngSwitchCase="'album-detail'">
    <div class="skeleton-album-header">
      <p-skeleton styleClass="skeleton-album-cover" width="220px" height="220px" borderRadius="16px" />
      <div class="skeleton-album-info">
        <p-skeleton width="60px" height="1.5rem" borderRadius="20px" styleClass="mb-3" />
        <p-skeleton width="70%" height="2rem" styleClass="mb-2" borderRadius="8px" />
        <p-skeleton width="30%" height="0.9rem" styleClass="mb-2" borderRadius="6px" />
        <p-skeleton width="90%" height="0.85rem" styleClass="mb-1" borderRadius="6px" />
        <p-skeleton width="80%" height="0.85rem" borderRadius="6px" />
      </div>
    </div>
    <p-skeleton width="200px" height="1.5rem" styleClass="mb-3 mt-4" borderRadius="8px" />
    <div class="skeleton-track-list">
      <div class="skeleton-track" *ngFor="let i of [0,1,2,3,4]">
        <p-skeleton shape="circle" size="1.5rem" styleClass="flex-shrink-0" />
        <p-skeleton shape="square" width="44px" height="44px" borderRadius="8px" styleClass="flex-shrink-0" />
        <p-skeleton width="40%" height="0.9rem" borderRadius="6px" />
        <p-skeleton width="60px" height="0.9rem" borderRadius="6px" styleClass="ms-auto" />
      </div>
    </div>
  </ng-container>

  <!-- ── Artist Detail ───────────────────────────────────────────── -->
  <ng-container *ngSwitchCase="'artist-detail'">
    <div class="skeleton-artist-header">
      <p-skeleton shape="circle" styleClass="skeleton-artist-avatar" size="160px" />
      <div class="skeleton-artist-info">
        <p-skeleton width="65%" height="2rem" styleClass="mb-2" borderRadius="8px" />
        <p-skeleton width="35%" height="0.9rem" styleClass="mb-2" borderRadius="6px" />
        <p-skeleton width="90%" height="0.85rem" styleClass="mb-1" borderRadius="6px" />
        <p-skeleton width="75%" height="0.85rem" borderRadius="6px" />
      </div>
    </div>
    <p-skeleton width="180px" height="1.5rem" styleClass="mb-3 mt-4" borderRadius="8px" />
    <div class="skeleton-grid">
      <div class="skeleton-card" *ngFor="let i of [0,1,2,3,4,5]">
        <p-skeleton styleClass="skeleton-thumb" height="180px" borderRadius="12px" />
        <div class="skeleton-card-body">
          <p-skeleton width="80%" height="1rem" styleClass="mb-2" borderRadius="6px" />
          <p-skeleton width="40%" height="0.9rem" borderRadius="6px" />
        </div>
      </div>
    </div>
  </ng-container>

  <!-- ── Profile ─────────────────────────────────────────────────── -->
  <ng-container *ngSwitchCase="'profile'">
    <div class="skeleton-profile">
      <div class="skeleton-profile-cover">
        <p-skeleton width="100%" height="160px" borderRadius="0" />
      </div>
      <div class="skeleton-profile-body">
        <p-skeleton shape="circle" size="96px" styleClass="skeleton-profile-avatar" />
        <div class="skeleton-profile-info">
          <p-skeleton width="200px" height="1.6rem" styleClass="mb-2" borderRadius="8px" />
          <p-skeleton width="160px" height="0.9rem" styleClass="mb-2" borderRadius="6px" />
          <div class="skeleton-tags">
            <p-skeleton width="70px" height="1.4rem" borderRadius="20px" />
            <p-skeleton width="80px" height="1.4rem" borderRadius="20px" />
          </div>
        </div>
      </div>
      <div class="skeleton-stats-strip">
        <p-skeleton width="80px" height="3rem" borderRadius="8px" />
        <p-skeleton width="1px" height="3rem" />
        <p-skeleton width="80px" height="3rem" borderRadius="8px" />
        <p-skeleton width="1px" height="3rem" />
        <p-skeleton width="80px" height="3rem" borderRadius="8px" />
      </div>
      <div class="skeleton-profile-cards">
        <p-skeleton width="100%" height="120px" borderRadius="12px" />
        <p-skeleton width="100%" height="200px" borderRadius="12px" />
      </div>
    </div>
  </ng-container>

</ng-container>
