<div class="admin-layout">
  <!-- Mobile overlay -->
  <div
    class="sidebar-overlay"
    [class.active]="sidebarOpen"
    (click)="closeSidebar()"
  ></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar" [class.open]="sidebarOpen">
    <div class="sidebar-header">
      <a
        [routerLink]="authService.isProducer() ? '/admin/songs' : '/admin'"
        class="sidebar-logo"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-music"></i>
        <span>REak<strong>Music</strong></span>
      </a>
      <button
        class="sidebar-close btn"
        (click)="closeSidebar()"
        aria-label="Close sidebar"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>

    <div class="sidebar-section-label">MANAGEMENT</div>

    <nav class="sidebar-nav">
      <a
        *ngIf="authService.isAdmin()"
        class="sidebar-nav-item"
        routerLink="/admin"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-gauge-high"></i>
        <span>Dashboard</span>
      </a>

      <a
        class="sidebar-nav-item"
        routerLink="/admin/songs"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-music"></i>
        <span>Songs</span>
      </a>

      <a
        *ngIf="authService.isAdmin()"
        class="sidebar-nav-item"
        routerLink="/admin/genres"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-tags"></i>
        <span>Genres</span>
      </a>

      <a
        class="sidebar-nav-item"
        routerLink="/admin/download-history"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span>Download History</span>
      </a>

      <a
        *ngIf="authService.isAdmin()"
        class="sidebar-nav-item"
        routerLink="/admin/artists"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-microphone-lines"></i>
        <span>Producers</span>
      </a>

      <a
        *ngIf="authService.isAdmin()"
        class="sidebar-nav-item"
        routerLink="/admin/subscriptions"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-credit-card"></i>
        <span>Subscriptions</span>
      </a>

      <a
        *ngIf="authService.isAdmin()"
        class="sidebar-nav-item"
        routerLink="/admin/users"
        routerLinkActive="active"
        (click)="closeSidebar()"
      >
        <i class="fa-solid fa-users"></i>
        <span>Users</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a routerLink="/home" class="back-to-site">
        <i class="fa-solid fa-arrow-left"></i>
        Back to Site
      </a>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="admin-main">
    <!-- Mobile topbar -->
    <div class="admin-topbar">
      <button
        class="mobile-menu-btn btn"
        (click)="toggleSidebar()"
        aria-label="Open menu"
      >
        <i class="fa-solid fa-bars"></i>
      </button>
      <span class="topbar-title">{{
        authService.isProducer() ? "Producer Panel" : "Admin Panel"
      }}</span>
      <a routerLink="/home" class="topbar-site-link">
        <i class="fa-solid fa-house"></i>
        Site
      </a>
    </div>

    <div class="admin-content">
      <p-breadcrumb [model]="breadcrumbs"></p-breadcrumb>
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
