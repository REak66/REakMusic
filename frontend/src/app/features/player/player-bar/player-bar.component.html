<ng-container *ngIf="currentSong$ | async as song">

<!-- ─── Floating Restore Tab (shown when minimized) ─── -->
<div 
  class="restore-tab" 
  *ngIf="isMinimized"
  (click)="toggleMinimize()"
  title="Show player"
  aria-label="Show player"
>
  <div class="restore-cover" [class.playing]="isPlaying$ | async">
    <img [src]="getCoverUrl(song)" [alt]="song.title" />
    <div class="restore-bars" *ngIf="isPlaying$ | async">
      <span></span><span></span><span></span>
    </div>
  </div>
  <div class="restore-info">
    <span class="restore-title">{{ song.title }}</span>
    <span class="restore-artist">{{ getArtistName(song) }}</span>
  </div>
  <button class="restore-play" (click)="$event.stopPropagation(); playerService.togglePlay()" [title]="(isPlaying$ | async) ? 'Pause' : 'Play'">
    <i *ngIf="isPlaying$ | async" class="fa-solid fa-pause"></i>
    <i *ngIf="!(isPlaying$ | async)" class="fa-solid fa-play"></i>
  </button>
  <div class="restore-expand">
    <i class="fa-solid fa-chevron-up"></i>
  </div>
</div>

<!-- ─── Full Player Bar ─── -->
<div class="player-bar" [class.minimized]="isMinimized">

  <!-- Collapse Button -->
  <button 
    class="close-btn" 
    (click)="toggleMinimize()"
    title="Minimize player"
    aria-label="Minimize player"
  >
    <i class="fa-solid fa-chevron-down"></i>
  </button>
  <div class="track-section">
    <div class="cover-wrap" [class.playing]="isPlaying$ | async">
      <img
        [src]="getCoverUrl(song)"
        [alt]="song.title"
        class="cover-img"
        loading="lazy"
      />
      <div class="playing-indicator" *ngIf="isPlaying$ | async">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
    <div class="track-meta">
      <span class="track-title" [title]="song.title">{{ song.title }}</span>
      <span class="track-artist" [title]="getArtistName(song)">{{ getArtistName(song) }}</span>
    </div>
    <button
      class="icon-action"
      [class.liked]="false"
      title="Add to favorites"
      aria-label="Add to favorites"
    >
      <i class="fa-regular fa-heart"></i>
    </button>
  </div>

  <!-- CENTER: Controls + Progress -->
  <div class="center-section">
    <div class="controls-row">
      <button
        class="icon-action secondary"
        [class.on]="shuffle$ | async"
        (click)="playerService.toggleShuffle()"
        [title]="(shuffle$ | async) ? 'Shuffle on' : 'Shuffle off'"
        [attr.aria-label]="(shuffle$ | async) ? 'Disable shuffle' : 'Enable shuffle'"
      >
        <i class="fa-solid fa-shuffle"></i>
      </button>

      <button 
        class="icon-action" 
        (click)="playerService.previous()" 
        title="Previous track"
        aria-label="Previous track"
      >
        <i class="fa-solid fa-backward-step"></i>
      </button>

      <button 
        class="play-pause-btn" 
        (click)="playerService.togglePlay()"
        [title]="(isPlaying$ | async) ? 'Pause' : 'Play'"
        [attr.aria-label]="(isPlaying$ | async) ? 'Pause' : 'Play'"
      >
        <i *ngIf="isPlaying$ | async" class="fa-solid fa-pause"></i>
        <i *ngIf="!(isPlaying$ | async)" class="fa-solid fa-play"></i>
      </button>

      <button 
        class="icon-action" 
        (click)="playerService.next()" 
        title="Next track"
        aria-label="Next track"
      >
        <i class="fa-solid fa-forward-step"></i>
      </button>

      <button
        class="icon-action secondary"
        [class.on]="(repeatMode$ | async) !== 'off'"
        (click)="playerService.toggleRepeat()"
        [title]="getRepeatTitle()"
        [attr.aria-label]="getRepeatTitle()"
      >
        <!-- repeat-one -->
        <span *ngIf="(repeatMode$ | async) === 'one'" class="fa-stack fa-xs">
          <i class="fa-solid fa-repeat"></i><span class="repeat-one-num">1</span>
        </span>
        <!-- repeat-all / off -->
        <i *ngIf="(repeatMode$ | async) !== 'one'" class="fa-solid fa-repeat"></i>
      </button>
    </div>

    <div class="progress-row">
      <span class="time-label">{{ playerService.formatTime((currentTime$ | async) ?? 0) }}</span>
      <div 
        class="progress-bar-wrap" 
        (click)="onProgressClick($event)"
        title="Seek"
        role="slider"
        [attr.aria-valuenow]="(currentTime$ | async) ?? 0"
        [attr.aria-valuemax]="(duration$ | async) ?? 0"
        aria-label="Seek slider"
      >
        <div class="progress-bg"></div>
        <div class="progress-filled" [style.width.%]="getProgressPercent()"></div>
        <input
          type="range"
          class="progress-input"
          [max]="(duration$ | async) ?? 0"
          [value]="(currentTime$ | async) ?? 0"
          (input)="onSeek($event)"
          aria-label="Seek slider"
        />
      </div>
      <span class="time-label">{{ playerService.formatTime((duration$ | async) ?? 0) }}</span>
    </div>
  </div>

  <!-- RIGHT: Volume -->
  <div class="volume-section">
    <button 
      class="icon-action" 
      (click)="playerService.toggleMute()" 
      [title]="(isMuted$ | async) ? 'Unmute' : 'Mute'"
      [attr.aria-label]="(isMuted$ | async) ? 'Unmute' : 'Mute'"
    >
      <!-- high volume -->
      <i *ngIf="!(isMuted$ | async) && ((volume$ | async) ?? 1) > 0.5" class="fa-solid fa-volume-high"></i>
      <!-- low volume -->
      <i *ngIf="!(isMuted$ | async) && ((volume$ | async) ?? 1) <= 0.5 && ((volume$ | async) ?? 1) > 0" class="fa-solid fa-volume-low"></i>
      <!-- muted / zero -->
      <i *ngIf="(isMuted$ | async) || ((volume$ | async) ?? 1) === 0" class="fa-solid fa-volume-xmark"></i>
    </button>
    <div 
      class="vol-bar-wrap"
      title="Volume"
      role="slider"
      [attr.aria-valuenow]="((volume$ | async) ?? 1) * 100"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-label="Volume slider"
    >
      <div class="vol-filled" [style.width.%]="((isMuted$ | async) ? 0 : ((volume$ | async) ?? 1)) * 100"></div>
      <input
        type="range"
        class="vol-input"
        min="0"
        max="1"
        step="0.02"
        [value]="(volume$ | async) ?? 1"
        (input)="onVolumeChange($event)"
        aria-label="Volume slider"
      />
    </div>
  </div>

</div>

</ng-container>
