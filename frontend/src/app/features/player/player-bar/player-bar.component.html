<div class="player-bar" *ngIf="currentSong$ | async as song">

  <!-- LEFT: Track Info -->
  <div class="track-section">
    <div class="cover-wrap">
      <img
        [src]="getCoverUrl(song)"
        [alt]="song.title"
        class="cover-img"
      />
    </div>
    <div class="track-meta">
      <span class="track-title">{{ song.title }}</span>
      <span class="track-artist">{{ getArtistName(song) }}</span>
    </div>
    <button
      class="icon-action"
      [class.liked]="false"
      title="Save to library"
    >
      <i class="fa-regular fa-bookmark"></i>
    </button>
  </div>

  <!-- CENTER: Controls + Progress -->
  <div class="center-section">
    <div class="controls-row">
      <button
        class="icon-action secondary"
        [class.on]="shuffle$ | async"
        (click)="playerService.toggleShuffle()"
        title="Shuffle"
      >
        <i class="fa-solid fa-shuffle"></i>
      </button>

      <button class="icon-action" (click)="playerService.previous()" title="Previous">
        <i class="fa-solid fa-backward-step"></i>
      </button>

      <button class="play-pause-btn" (click)="playerService.togglePlay()">
        <i *ngIf="isPlaying$ | async" class="fa-solid fa-pause"></i>
        <i *ngIf="!(isPlaying$ | async)" class="fa-solid fa-play"></i>
      </button>

      <button class="icon-action" (click)="playerService.next()" title="Next">
        <i class="fa-solid fa-forward-step"></i>
      </button>

      <button
        class="icon-action secondary"
        [class.on]="(repeatMode$ | async) !== 'off'"
        (click)="playerService.toggleRepeat()"
        title="Repeat"
      >
        <!-- repeat-one -->
        <span *ngIf="(repeatMode$ | async) === 'one'" class="fa-stack fa-xs">
          <i class="fa-solid fa-repeat"></i><span class="repeat-one-num">1</span>
        </span>
        <!-- repeat-all / off -->
        <i *ngIf="(repeatMode$ | async) !== 'one'" class="fa-solid fa-repeat"></i>
      </button>
    </div>

    <div class="progress-row">
      <span class="time-label">{{ playerService.formatTime((currentTime$ | async) ?? 0) }}</span>
      <div class="progress-bar-wrap" (click)="onProgressClick($event)">
        <div class="progress-bg"></div>
        <div class="progress-filled" [style.width.%]="getProgressPercent()"></div>
        <input
          type="range"
          class="progress-input"
          [max]="(duration$ | async) ?? 0"
          [value]="(currentTime$ | async) ?? 0"
          (input)="onSeek($event)"
        />
      </div>
      <span class="time-label">{{ playerService.formatTime((duration$ | async) ?? 0) }}</span>
    </div>
  </div>

  <!-- RIGHT: Volume -->
  <div class="volume-section">
    <button class="icon-action" (click)="playerService.toggleMute()" title="Mute">
      <!-- high volume -->
      <i *ngIf="!(isMuted$ | async) && ((volume$ | async) ?? 1) > 0.5" class="fa-solid fa-volume-high"></i>
      <!-- low volume -->
      <i *ngIf="!(isMuted$ | async) && ((volume$ | async) ?? 1) <= 0.5 && ((volume$ | async) ?? 1) > 0" class="fa-solid fa-volume-low"></i>
      <!-- muted / zero -->
      <i *ngIf="(isMuted$ | async) || ((volume$ | async) ?? 1) === 0" class="fa-solid fa-volume-xmark"></i>
    </button>
    <div class="vol-bar-wrap">
      <div class="vol-filled" [style.width.%]="((isMuted$ | async) ? 0 : ((volume$ | async) ?? 1)) * 100"></div>
      <input
        type="range"
        class="vol-input"
        min="0"
        max="1"
        step="0.02"
        [value]="(volume$ | async) ?? 1"
        (input)="onVolumeChange($event)"
      />
    </div>
  </div>

</div>
