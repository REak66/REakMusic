<div class="song-list-page main-content">
  <div class="container">
    <app-animate-on-scroll enterClass="animate-fade-in-down" [threshold]="0.1">
      <h1 class="page-title">{{ 'nav.browse' | translate }}</h1>
    </app-animate-on-scroll>

    <!-- Filters -->
    <app-animate-on-scroll enterClass="animate-fade-in" [threshold]="0.1">
    <form [formGroup]="filterForm" class="filters-bar">
      <div class="search-wrap">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input
          type="text"
          formControlName="search"
          [placeholder]="'common.search' | translate"
          class="search-input"
        />
      </div>

      <select formControlName="genre" class="filter-select">
        <option value="">All Genres</option>
        <option *ngFor="let g of genres" [value]="g._id">{{ g.name }}</option>
      </select>

      <input type="number" formControlName="releaseYear" placeholder="Year" class="filter-num filter-year" />

      <select formControlName="sort" class="filter-select">
        <option *ngFor="let opt of sortOptions" [value]="opt.value">{{ opt.label }}</option>
      </select>
    </form>
    </app-animate-on-scroll>

    <!-- Results info -->
    <p class="results-info" *ngIf="!loading">
      <strong>{{ total }}</strong> songs found
    </p>

    <!-- Skeleton -->
    <app-skeleton type="song-cards" [count]="12" *ngIf="loading" />

    <!-- Grid -->
    <div class="grid-songs" *ngIf="!loading">
      <div class="song-card"
        *ngFor="let song of songs"
        [routerLink]="['/home/songs', song._id]"
        pAnimateOnScroll
        enterClass="animate-zoom-in"
        [threshold]="0.1">
        <div class="song-thumbnail">
          <img [src]="getThumbnail(song)" [alt]="song.title" loading="lazy" />
          <div class="play-overlay">
            <div class="play-icon"><i class="fa-solid fa-play"></i></div>
          </div>
        </div>
        <div class="song-info">
          <div class="song-title">{{ song.title }}</div>
          <div class="song-artist">{{ getArtistName(song) }}</div>
        </div>
      </div>
    </div>

    <p class="no-results" *ngIf="!loading && songs.length === 0">{{ 'common.noResults' | translate }}</p>

    <!-- Pagination -->
    <app-pagination
      [total]="total"
      [pageSize]="limit"
      [currentPage]="page"
      (pageChange)="onPageChange($event)"
      (pageSizeChange)="onLimitChange($event)"
    ></app-pagination>
  </div>
</div>
