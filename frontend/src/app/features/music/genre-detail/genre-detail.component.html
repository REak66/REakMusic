<div class="genre-detail-page main-content">
  <div class="container">
    <div class="genre-detail-skeleton" *ngIf="loading">
      <div class="genre-header-skeleton">
        <div class="badge-skeleton"></div>
        <div class="title-skeleton"></div>
      </div>
      <app-skeleton type="song-cards" [count]="8"></app-skeleton>
    </div>

    <div *ngIf="genre && !loading">
      <div class="genre-header">
        <span class="badge badge-primary">Genre</span>
        <h1>{{ genre.name }}</h1>
      </div>

      <div class="grid-songs">
        <div
          class="song-card"
          *ngFor="let song of songs"
          [routerLink]="['/home/songs', song._id]"
        >
          <div class="song-thumbnail">
            <img [src]="getThumbnail(song)" [alt]="song.title" loading="lazy" />
            <div class="play-overlay">
              <div class="play-icon"><i class="fa-solid fa-play"></i></div>
            </div>
          </div>
          <div class="song-info">
            <div class="song-title">{{ song.title }}</div>
            <div class="song-artist">{{ getArtistName(song) }}</div>
          </div>
        </div>
      </div>
      <p *ngIf="songs.length === 0" class="no-results">
        {{ "common.noResults" | translate }}
      </p>
    </div>
  </div>
</div>
