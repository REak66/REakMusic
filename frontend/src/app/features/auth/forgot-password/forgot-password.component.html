<div class="auth-page">
  <div class="auth-card card">
    <h1 class="auth-title">{{ 'auth.forgotPassword' | translate }}</h1>
    <p class="auth-hint">Enter your email and we'll send an OTP to reset your password.</p>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="success">{{ success }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ 'auth.email' | translate }}</label>
        <input type="email" formControlName="email"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" />
        <span class="error-msg" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">Invalid email</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading || form.invalid">
        <span *ngIf="loading">{{ 'common.loading' | translate }}</span>
        <span *ngIf="!loading">Send OTP</span>
      </button>
    </form>

    <p class="auth-switch"><a routerLink="/auth/login"><i class="fa-solid fa-arrow-left"></i> Back to login</a></p>
  </div>
</div>
