<div class="auth-page">
  <div class="auth-card card">
    <h1 class="auth-title">{{ 'auth.resetPassword' | translate }}</h1>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="success">{{ success }}</div>

    <form [formGroup]="form">
      <!-- Step 1: OTP -->
      <ng-container *ngIf="step === 'otp'">
        <div class="form-group">
          <label>Enter OTP sent to {{ email }}</label>
          <input type="text" formControlName="otp" maxlength="6" placeholder="000000" class="otp-input" />
        </div>
        <button type="button" class="btn btn-primary btn-full" (click)="verifyOtp()" [disabled]="loading">
          <span *ngIf="loading">{{ 'common.loading' | translate }}</span>
          <span *ngIf="!loading">Verify OTP</span>
        </button>
      </ng-container>

      <!-- Step 2: New Password -->
      <ng-container *ngIf="step === 'password'">
        <div class="form-group">
          <label>New Password</label>
          <input type="password" formControlName="newPassword"
            [class.is-invalid]="form.get('newPassword')?.invalid && form.get('newPassword')?.touched" />
          <span class="error-msg" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.hasError('minlength')">At least 8 characters</span>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" formControlName="confirmPassword"
            [class.is-invalid]="form.hasError('mismatch') && form.get('confirmPassword')?.touched" />
          <span class="error-msg" *ngIf="form.hasError('mismatch') && form.get('confirmPassword')?.touched">Passwords do not match</span>
        </div>
        <button type="button" class="btn btn-primary btn-full" (click)="onSubmit()" [disabled]="loading || form.invalid">
          <span *ngIf="loading">{{ 'common.loading' | translate }}</span>
          <span *ngIf="!loading">{{ 'auth.resetPassword' | translate }}</span>
        </button>
      </ng-container>
    </form>
    <p class="auth-switch"><a routerLink="/auth/login">← Back to login</a></p>
  </div>
</div>
