<div class="auth-page">
  <om-silk [color]="'#7c3aed'" [speed]="0.05" [scale]="0.8" [noiseIntensity]="1.2" class="auth-silk-bg"></om-silk>
  <div class="auth-card card">
    <a class="auth-logo" routerLink="/home">
      <div class="logo-icon"><i class="fa-solid fa-music"></i></div>
      <span class="logo-name">REakMusic</span>
    </a>
    <h1 class="auth-title">{{ 'auth.register' | translate }}</h1>
    <p class="auth-subtitle">Create your free account today.</p>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ 'auth.fullName' | translate }}</label>
        <input type="text" formControlName="fullName" placeholder="John Doe"
          [class.is-invalid]="form.get('fullName')?.invalid && form.get('fullName')?.touched" />
        <span class="error-msg" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('required')">Full
          name is required</span>
        <span class="error-msg" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('minlength')">At
          least 2 characters</span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.email' | translate }}</label>
        <input type="email" formControlName="email" placeholder="you@example.com"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" autocomplete="email" />
        <span class="error-msg" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">Invalid
          email</span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.phone' | translate }}</label>
        <input type="tel" formControlName="phone" placeholder="0123456789" />
      </div>

      <div class="form-group role-group">
        <label>Account Type</label>
        <app-select-dropdown formControlName="role" [options]="roleOptions" placeholder="Select account type"
          id="register-role"></app-select-dropdown>
      </div>

      <div class="form-group">
        <label>{{ 'auth.password' | translate }}</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" formControlName="password" placeholder="Min 8 characters"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            autocomplete="new-password" />
          <button type="button" class="password-toggle" (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <i class="fa-regular" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
          </button>
        </div>
        <span class="error-msg" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">At
          least 8 characters</span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.confirmPassword' | translate }}</label>
        <div class="password-wrapper">
          <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
            placeholder="Repeat password"
            [class.is-invalid]="form.hasError('mismatch') && form.get('confirmPassword')?.touched"
            autocomplete="new-password" />
          <button type="button" class="password-toggle" (click)="toggleConfirmPassword()"
            [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'">
            <i class="fa-regular" [class.fa-eye]="!showConfirmPassword" [class.fa-eye-slash]="showConfirmPassword"></i>
          </button>
        </div>
        <span class="error-msg" *ngIf="form.hasError('mismatch') && form.get('confirmPassword')?.touched">Passwords do
          not match</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading || form.invalid">
        <span *ngIf="loading">{{ 'common.loading' | translate }}</span>
        <span *ngIf="!loading">{{ 'auth.register' | translate }}</span>
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a routerLink="/auth/login">{{ 'auth.login' | translate }}</a>
    </p>
  </div>
</div>
