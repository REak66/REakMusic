<div class="auth-page">
  <div class="auth-card card">
    <h1 class="auth-title">{{ 'auth.register' | translate }}</h1>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ 'auth.fullName' | translate }}</label>
        <input type="text" formControlName="fullName"
          [class.is-invalid]="form.get('fullName')?.invalid && form.get('fullName')?.touched" />
        <span class="error-msg" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('required')">Full name is required</span>
        <span class="error-msg" *ngIf="form.get('fullName')?.touched && form.get('fullName')?.hasError('minlength')">At least 2 characters</span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.email' | translate }}</label>
        <input type="email" formControlName="email"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched" autocomplete="email" />
        <span class="error-msg" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">Invalid email</span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.phone' | translate }}</label>
        <input type="tel" formControlName="phone" />
      </div>

      <div class="form-group">
        <label>{{ 'auth.password' | translate }}</label>
        <input type="password" formControlName="password"
          [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched" autocomplete="new-password" />
        <span class="error-msg" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">At least 8 characters</span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.confirmPassword' | translate }}</label>
        <input type="password" formControlName="confirmPassword"
          [class.is-invalid]="form.hasError('mismatch') && form.get('confirmPassword')?.touched" autocomplete="new-password" />
        <span class="error-msg" *ngIf="form.hasError('mismatch') && form.get('confirmPassword')?.touched">Passwords do not match</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading || form.invalid">
        <span *ngIf="loading">{{ 'common.loading' | translate }}</span>
        <span *ngIf="!loading">{{ 'auth.register' | translate }}</span>
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a routerLink="/auth/login">{{ 'auth.login' | translate }}</a>
    </p>
  </div>
</div>
