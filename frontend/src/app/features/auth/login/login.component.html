<div class="auth-page">
  <div class="auth-card card">
    <a class="auth-logo" routerLink="/home">
      <div class="logo-icon"><i class="fa-solid fa-music"></i></div>
      <span class="logo-name">REakMusic</span>
    </a>
    <h1 class="auth-title">{{ "auth.login" | translate }}</h1>
    <p class="auth-subtitle">Welcome back! Sign in to your account.</p>

    <div class="alert alert-info" *ngIf="infoMessageKey">
      {{ infoMessageKey | translate }}
    </div>
    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ "auth.email" | translate }}</label>
        <input
          type="email"
          formControlName="email"
          [class.is-invalid]="
            form.get('email')?.invalid && form.get('email')?.touched
          "
          placeholder="you@example.com"
          autocomplete="email"
        />
        <span
          class="error-msg"
          *ngIf="
            form.get('email')?.touched &&
            form.get('email')?.hasError('required')
          "
        >
          Email is required
        </span>
        <span
          class="error-msg"
          *ngIf="
            form.get('email')?.touched && form.get('email')?.hasError('email')
          "
        >
          Invalid email address
        </span>
      </div>

      <div class="form-group">
        <label>{{ "auth.password" | translate }}</label>
        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            [class.is-invalid]="
              form.get('password')?.invalid && form.get('password')?.touched
            "
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="password-toggle"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
          >
            <i
              class="fa-regular"
              [class.fa-eye]="!showPassword"
              [class.fa-eye-slash]="showPassword"
            ></i>
          </button>
        </div>
        <span
          class="error-msg"
          *ngIf="
            form.get('password')?.touched &&
            form.get('password')?.hasError('required')
          "
        >
          Password is required
        </span>
      </div>

      <div class="auth-actions">
        <a routerLink="/auth/forgot-password">{{
          "auth.forgotPassword" | translate
        }}</a>
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-full"
        [disabled]="loading || form.invalid"
      >
        <span *ngIf="loading">{{ "common.loading" | translate }}</span>
        <span *ngIf="!loading">{{ "auth.login" | translate }}</span>
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a routerLink="/auth/register">{{ "auth.register" | translate }}</a>
    </p>
  </div>
</div>
