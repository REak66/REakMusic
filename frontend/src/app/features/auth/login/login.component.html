<div class="auth-page">
  <div class="auth-card card">
    <h1 class="auth-title">{{ 'auth.login' | translate }}</h1>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ 'auth.email' | translate }}</label>
        <input
          type="email"
          formControlName="email"
          [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
          autocomplete="email"
        />
        <span class="error-msg" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </span>
        <span class="error-msg" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Invalid email address
        </span>
      </div>

      <div class="form-group">
        <label>{{ 'auth.password' | translate }}</label>
        <input
          type="password"
          formControlName="password"
          [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
          autocomplete="current-password"
        />
        <span class="error-msg" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('required')">
          Password is required
        </span>
      </div>

      <div class="auth-actions">
        <a routerLink="/auth/forgot-password">{{ 'auth.forgotPassword' | translate }}</a>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading || form.invalid">
        <span *ngIf="loading">{{ 'common.loading' | translate }}</span>
        <span *ngIf="!loading">{{ 'auth.login' | translate }}</span>
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account? <a routerLink="/auth/register">{{ 'auth.register' | translate }}</a>
    </p>
  </div>
</div>
