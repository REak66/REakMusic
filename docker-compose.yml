version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reakmusic-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/reakmusic
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - reakmusic-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reakmusic-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - reakmusic-net

  mongo:
    image: mongo:7
    container_name: reakmusic-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reakmusic-net

  redis:
    image: redis:7-alpine
    container_name: reakmusic-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reakmusic-net

volumes:
  mongo-data:
  redis-data:

networks:
  reakmusic-net:
    driver: bridge
